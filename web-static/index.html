<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    // Sets the theme before first paint so an explicit light/dark preference
    // (see "Dark mode" in web-static/README.md) never flashes the wrong
    // theme first -- inlined and duplicated per-page rather than an external
    // script, since an external file would itself add a delay this exists to
    // avoid. The "system" default needs no JS at all: style.css's own
    // prefers-color-scheme media query handles it.
    (function () {
        try {
            var theme = localStorage.getItem('themePreference');
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.dataset.theme = theme;
            }
        } catch (e) {
            // localStorage unavailable (e.g. private browsing) -- falls back
            // to the system default.
        }
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodSwings-Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <h1>MoodSwings-Web</h1>
        <p>A web-based simulator for the Mood Swings TCG.</p>

        <form id="login-form" hidden>
            <div class="field">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">Log in</button>
            <p id="login-error" class="error" hidden></p>
        </form>

        <p id="login-register-link" hidden>Don't have an account? <a href="register.html">Register</a></p>
    </main>

    <dialog id="resources-dialog">
        <h2>Resources</h2>
        <ul id="resources-list">
            <li><a href="https://magic.wizards.com/en/news/feature/mood-swings-extended-rules" target="_blank" rel="noopener noreferrer">Rules</a></li>
            <li><a href="https://magic.wizards.com/en/news/feature/other-ways-to-play-mood-swings" target="_blank" rel="noopener noreferrer">Formats</a></li>
            <li><a href="https://magic.wizards.com/en/news/feature/mood-swings-card-notes" target="_blank" rel="noopener noreferrer">Card Specific Rulings</a></li>
            <li><a href="https://magic.wizards.com/en/news/card-image-gallery/mood-swings" target="_blank" rel="noopener noreferrer">Card Gallery</a></li>
            <li><a href="https://moodswings.scryfall.com/" target="_blank" rel="noopener noreferrer">Moodfall (Mood Swings Card Repository)</a></li>
            <li><a href="https://discord.gg/GgHFEBAd6C" target="_blank" rel="noopener noreferrer">Discord</a></li>
            <li><a href="https://www.reddit.com/r/moodswingstcg/" target="_blank" rel="noopener noreferrer">Reddit</a></li>
            <li><a href="https://github.com/jceddy/MoodSwings-Web" target="_blank" rel="noopener noreferrer">GitHub repository</a></li>
        </ul>
        <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="jceddy" data-color="#FFDD00" data-emoji="" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff"></script>
        <button id="resources-close-button" type="button">Close</button>
    </dialog>

    <footer><span id="app-version"></span><a id="resources-link" href="#">Resources</a><label id="theme-select-label">Theme
        <select id="theme-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </label></footer>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
