<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    // Sets the theme before first paint so an explicit light/dark preference
    // (see "Dark mode" in web-static/README.md) never flashes the wrong
    // theme first -- inlined and duplicated per-page rather than an external
    // script, since an external file would itself add a delay this exists to
    // avoid. The "system" default needs no JS at all: style.css's own
    // prefers-color-scheme media query handles it.
    (function () {
        try {
            var theme = localStorage.getItem('themePreference');
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.dataset.theme = theme;
            }
        } catch (e) {
            // localStorage unavailable (e.g. private browsing) -- falls back
            // to the system default.
        }
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodSwings-Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <h1>MoodSwings-Web</h1>
        <p>A web-based simulator for the Mood Swings TCG.</p>

        <form id="login-form" hidden>
            <div class="field">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">Log in</button>
            <p id="login-error" class="error" hidden></p>
        </form>

        <p id="login-register-link" hidden>Don't have an account? <a href="register.html">Register</a></p>
    </main>
    <footer><span id="app-version"></span><label id="theme-select-label">Theme
        <select id="theme-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </label></footer>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
