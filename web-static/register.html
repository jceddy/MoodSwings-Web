<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    // Sets the theme before first paint so an explicit light/dark preference
    // (see "Dark mode" in web-static/README.md) never flashes the wrong
    // theme first -- inlined and duplicated per-page rather than an external
    // script, since an external file would itself add a delay this exists to
    // avoid. The "system" default needs no JS at all: style.css's own
    // prefers-color-scheme media query handles it.
    (function () {
        try {
            var theme = localStorage.getItem('themePreference');
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.dataset.theme = theme;
            }
        } catch (e) {
            // localStorage unavailable (e.g. private browsing) -- falls back
            // to the system default.
        }
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MoodSwings-Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <h1>Create an account</h1>

        <form id="register-form">
            <div class="field">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" required autocomplete="username" minlength="3" maxlength="32">
            </div>
            <div class="field">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" name="email" required autocomplete="email">
            </div>
            <div class="field">
                <label for="register-phone">Phone number (optional)</label>
                <input type="tel" id="register-phone" name="phone_number" autocomplete="tel">
            </div>
            <div class="field">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" required autocomplete="new-password" minlength="8" maxlength="72">
            </div>
            <button type="submit">Register</button>
            <p id="register-error" class="error" hidden></p>
            <p id="register-success" class="success" hidden></p>
        </form>

        <p><a href="/">Back to login</a></p>
    </main>
    <footer><span id="app-version"></span><label id="theme-select-label">Theme
        <select id="theme-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </label></footer>
    <script src="js/app.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
