name: Deploy to Bluehost (dev)

# Mirrors deploy.yml (production, triggered by main) exactly, aside from
# which branch triggers it and which set of secrets/vars it reads for
# FTP/DB/APP_URL/SITE_URL -- entirely separate DEV_-prefixed names there,
# so setting up (or getting wrong) the dev environment's credentials can
# never touch the already-configured, already-live production FTP/DB
# secrets deploy.yml itself reads. SMTP is the one deliberate exception:
# both workflows read the same plain SMTP_* secrets, since it's just a
# transactional-email sender, not something that differs meaningfully
# between environments (and dev verification emails going out from the
# same configured sender is expected, not a leak of anything sensitive).
# See "Branching & environments" in the top-level README for the
# promotion flow this supports: feature PRs merge into `development`
# (auto-deploying here), and periodically a PR from `development` into
# `main` promotes a batch of changes to production on a more controlled
# schedule.
on:
  push:
    branches: [development]

env:
  # Must be >= the "php": ">=8.1" requirement in php-app/composer.json, and
  # should match the PHP version set for your dev domain in cPanel's
  # MultiPHP Manager so the deployed code actually runs the way it was
  # built.
  PHP_VERSION: '8.1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, openssl
          coverage: none

      - name: Install PHP dependencies
        working-directory: php-app
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Assemble deploy artifact
        env:
          DB_HOST: ${{ secrets.DEV_DB_HOST }}
          DB_PORT: ${{ secrets.DEV_DB_PORT }}
          DB_NAME: ${{ secrets.DEV_DB_NAME }}
          DB_USER: ${{ secrets.DEV_DB_USER }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          APP_URL: ${{ vars.DEV_APP_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          # Static site at the domain root.
          cp -R web-static/. dist/

          # The repo-root VERSION file (see "Versioning" in the top-level
          # README) is the single source of truth for the whole site's
          # product version -- deployed alongside index.html so the
          # frontend's own version indicator (web-static/js/app.js) can
          # fetch it as a plain static file, no PHP round trip needed.
          cp VERSION dist/VERSION

          # Bust browser caches on every deploy: filenames never change
          # between deploys, so a browser that already cached an old JS/CSS
          # file (e.g. from before a feature existed) can silently keep
          # serving it even after the HTML referencing it is fresh. Appending
          # the commit SHA to each reference forces a fetch of the new file.
          SHORT_SHA="${GITHUB_SHA:0:8}"
          find dist -name '*.html' -print0 \
            | xargs -0 sed -i -E "s/(src|href)=\"([^\"]+\.(js|css))\"/\1=\"\2?v=${SHORT_SHA}\"/g"

          # PHP app's front controller lives under /app; public/.htaccess
          # rewrites requests to it so index.php's router still works.
          mkdir -p dist/app
          cp -R php-app/public/. dist/app/

          # App code and dependencies, siblings of app/ so index.php's
          # existing dirname(__DIR__) paths resolve unchanged.
          cp -R php-app/src dist/src
          cp -R php-app/vendor dist/vendor

          # Runtime config generated from repo secrets; never committed. Only
          # write a line when the secret/variable is actually set, so unset
          # optional ones (e.g. SMTP_PORT) fall back to Config::get()'s coded
          # defaults instead of resolving to a literal empty string.
          write_env_var() {
            if [ -n "$2" ]; then
              echo "$1=$2" >> dist/.env
            fi
          }

          : > dist/.env
          write_env_var DB_HOST "$DB_HOST"
          write_env_var DB_PORT "$DB_PORT"
          write_env_var DB_NAME "$DB_NAME"
          write_env_var DB_USER "$DB_USER"
          write_env_var DB_PASSWORD "$DB_PASSWORD"
          write_env_var APP_URL "$APP_URL"
          write_env_var SMTP_HOST "$SMTP_HOST"
          write_env_var SMTP_PORT "$SMTP_PORT"
          write_env_var SMTP_USERNAME "$SMTP_USERNAME"
          write_env_var SMTP_PASSWORD "$SMTP_PASSWORD"
          write_env_var SMTP_ENCRYPTION "$SMTP_ENCRYPTION"
          write_env_var SMTP_FROM_ADDRESS "$SMTP_FROM_ADDRESS"
          write_env_var SMTP_FROM_NAME "$SMTP_FROM_NAME"

          # dist/, vendor/, and src/ all end up under the shared document
          # root (no Bluehost document-root change required), so block
          # direct HTTP access to the files that aren't meant to be served.
          cat > dist/.htaccess <<'HTACCESS'
          <FilesMatch "^\.env$">
              Require all denied
          </FilesMatch>
          HTACCESS
          echo 'Require all denied' > dist/vendor/.htaccess
          echo 'Require all denied' > dist/src/.htaccess

      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEV_FTP_SERVER }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          server-dir: ${{ vars.DEV_FTP_SERVER_DIR || '/public_html/' }}
          local-dir: ./dist/
          exclude: |
            **/.git*
            **/.git*/**

      - name: Smoke test deployed health endpoint
        if: ${{ vars.DEV_SITE_URL != '' }}
        env:
          SITE_URL: ${{ vars.DEV_SITE_URL }}
        run: curl -fsS "$SITE_URL/app/health"
